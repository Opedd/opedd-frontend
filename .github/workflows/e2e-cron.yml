name: E2E Behavioral Tests (every 6h)

# Phase 11.5 Playwright E2E suite — continuous end-to-end behavioral validation
# against production. Per CLAUDE.md Rule 14, milestone closure requires a fresh
# test user completing the intended user flow end-to-end. This workflow runs
# that test every 6 hours, alerting Sentry + auto-filing a GitHub issue on any
# path failure.
#
# Test publisher cleanup: `+e2etest-` email prefix; rows older than 1 day
# swept at the start of each run (idempotent recovery from prior failures).

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Force a specific path to fail for alert-pipeline validation (beehiiv | ghost | substack | substack-cron | customapi). Leave blank for normal run."
        required: false
        default: ""

concurrency:
  group: e2e-${{ github.workflow }}
  cancel-in-progress: false  # Let each run finish; don't cancel mid-test

# Required for the auto-file-GitHub-issue-on-failure step. Default GITHUB_TOKEN
# lacks issues:write — without this, `gh issue create` returns
# `GraphQL: Resource not accessible by integration (createIssue)` and the
# failure channel is silent (Phase 11.5 first-real-run diagnosis 2026-05-18).
permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Capture the PRIOR completed run's conclusion so we can gate alerting
      # on green→red transitions (not every red continuation). Without this
      # gate, every failed cron tick auto-files a fresh `[E2E][BLOCKER]`
      # issue + emails the founder, even when the current red is just a
      # continuation of an already-known broken state. Phase 11.5 founder
      # ratification 2026-05-18: alerting should fire on initial failure
      # and recovery only — silence the steady-state red.
      #
      # `--status completed` excludes this in-progress run; `--limit 1`
      # returns the most-recent completed run on main. Fallback "none"
      # for the bootstrap case (workflow has no prior runs).
      - name: Capture prior run conclusion (for alert-gating)
        id: prior_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRIOR=$(gh run list \
            --workflow="${{ github.workflow }}" \
            --branch main \
            --status completed \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // "none"')
          echo "conclusion=$PRIOR" >> "$GITHUB_OUTPUT"
          echo "Prior run conclusion: $PRIOR (will gate alerting on this)"

      # Pre-flight: assert all required secrets are non-empty BEFORE running
      # the suite. Phase 11 close-validation Wave 3 fix — pre-Wave-3 the
      # fixture's `getAdminClient()` threw at test-runtime when SUPABASE_URL /
      # SUPABASE_SERVICE_ROLE_KEY were unset, which produced 4× retried
      # cryptic failures + auto-filed misleading GitHub issues. Failing here
      # surfaces "secret X is missing" as the literal error message.
      - name: Pre-flight env check
        env:
          PLAYWRIGHT_BASE_URL: https://opedd.com
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_BEEHIIV_API_KEY: ${{ secrets.TEST_BEEHIIV_API_KEY }}
          TEST_BEEHIIV_PUB_ID: ${{ secrets.TEST_BEEHIIV_PUB_ID }}
          TEST_GHOST_SITE_URL: ${{ secrets.TEST_GHOST_SITE_URL }}
          TEST_GHOST_ADMIN_API_KEY: ${{ secrets.TEST_GHOST_ADMIN_API_KEY }}
          TEST_SUBSTACK_URL: ${{ secrets.TEST_SUBSTACK_URL }}
        run: |
          # TEST_SUBSTACK_URL intentionally omitted — substack.spec.ts:30
          # defaults to "https://chinatalk.media" when the env var is unset,
          # so empty is a valid configuration (use the default). Gating on it
          # would reject the founder's intended "use the default" state
          # (Phase 11.5 first-real-run diagnosis 2026-05-18).
          missing=()
          for var in PLAYWRIGHT_BASE_URL SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY \
                     SUPABASE_ANON_KEY TEST_BEEHIIV_API_KEY TEST_BEEHIIV_PUB_ID \
                     TEST_GHOST_SITE_URL TEST_GHOST_ADMIN_API_KEY; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::E2E pre-flight: the following GitHub Actions secrets are unset (or empty): ${missing[*]}"
            echo "::error::Set them at https://github.com/${{ github.repository }}/settings/secrets/actions and re-run."
            exit 1
          fi
          echo "Pre-flight OK — all 8 required secrets present (TEST_SUBSTACK_URL optional, spec self-defaults)."

      - name: Run E2E suite against production
        env:
          PLAYWRIGHT_BASE_URL: https://opedd.com
          OPEDD_API_BASE: https://api.opedd.com
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_BEEHIIV_API_KEY: ${{ secrets.TEST_BEEHIIV_API_KEY }}
          TEST_BEEHIIV_PUB_ID: ${{ secrets.TEST_BEEHIIV_PUB_ID }}
          TEST_GHOST_SITE_URL: ${{ secrets.TEST_GHOST_SITE_URL }}
          TEST_GHOST_ADMIN_API_KEY: ${{ secrets.TEST_GHOST_ADMIN_API_KEY }}
          TEST_SUBSTACK_URL: ${{ secrets.TEST_SUBSTACK_URL }}
          # Force-fail mechanism for alert-pipeline validation:
          # workflow_dispatch with input `force_fail: <path>` exercises the
          # Sentry + GitHub-issue alerting end-to-end.
          E2E_FORCE_FAIL: ${{ inputs.force_fail }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      # Sentry monitor check-in step removed 2026-05-18 — the auto-filed
      # GitHub issue below is the single failure-alert channel. The Sentry
      # monitors API requires a project DSN (not a personal auth token); the
      # `Authorization: DSN <token>` shape was returning 401 every failure run
      # ("Authentication credentials were not provided"). A second alert
      # channel with fragile DSN-shape dependency adds maintenance cost
      # without adding signal (Phase 11.5 first-real-run diagnosis).

      # Alerting policy (2026-05-18):
      #   green→red (initial failure):       file new issue + notify founder
      #   red→red   (steady-state failure):  silent — existing issue covers it
      #   red→green (recovery):              close any open `[E2E][BLOCKER]`
      #                                      issues with a recovery comment
      #   green→green:                       no alerting work
      # This matches the founder's "stop emailing for runs already superseded"
      # request and surfaces real transitions only.
      - name: Auto-file GitHub issue on failure (green→red transition only)
        if: failure() && steps.prior_run.outputs.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Note: --label intentionally omitted. Pre-Wave-3 used
          # `--label "e2e-failure,priority:high"` but those labels don't exist
          # in the repo, which caused `gh issue create` to error out and the
          # issue was never filed. If founder wants labels, pre-create them
          # via `gh label create e2e-failure --color B60205` and re-add the
          # --label flag here.
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "[E2E][BLOCKER] Behavioral test failure — $(date +%Y-%m-%d)" \
            --body "Phase 11.5 E2E suite failed on scheduled cron run.

          - **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - **Triggered by:** ${{ github.event_name }}
          - **Workflow:** ${{ github.workflow }}

          Artifacts (Playwright report + traces) uploaded to the run. Per CLAUDE.md Rule 14, milestone closure is invalid until E2E suite passes; this issue is a hard blocker.

          Auto-filed by .github/workflows/e2e-cron.yml."

      - name: Close open E2E blocker issues on recovery (red→green transition)
        if: success() && steps.prior_run.outputs.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Recovery signal — if the prior run was red and this run is green,
          # close any open `[E2E][BLOCKER]` issues with a comment pointing at
          # the green run that resolved the state. Founder gets a positive
          # "closed" notification instead of silence-then-confusion.
          OPEN_NUMS=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --search "E2E BLOCKER in:title" \
            --json number \
            --jq '.[].number')
          if [ -z "$OPEN_NUMS" ]; then
            echo "No open [E2E][BLOCKER] issues to close."
            exit 0
          fi
          for num in $OPEN_NUMS; do
            echo "Closing issue #$num (resolved by green run ${{ github.run_id }})"
            gh issue close "$num" \
              --repo "${{ github.repository }}" \
              --comment "Resolved by green run ${{ github.run_id }}: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          done
