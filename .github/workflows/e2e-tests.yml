name: E2E Gatekeeper + Deploy

# Triggers: every push to main, every PR targeting main, and manual dispatch.
# Vercel git integration is DISABLED — this workflow is the sole deployment path.
#
# Split into three jobs:
#   1. quick-checks — typecheck + lint + unit tests. Always runs (PR or main).
#      Fast (~2–3 min). Catches the regressions the slow suite catches 80% of
#      the time at a fraction of the cost.
#   2. e2e         — full Playwright suite against prod Supabase. Runs on:
#                      - push to main (to gate the deploy),
#                      - PRs labeled `run-e2e` (opt-in safety net),
#                      - manual workflow_dispatch.
#                    Skipped by default on PRs to keep iteration fast.
#   3. deploy      — Vercel production deploy. Runs only on push to main, and
#                    only if quick-checks + e2e both pass.
#
# To run the full E2E suite on a PR: add the `run-e2e` label to the PR, then
# re-run the workflow (Actions tab → latest run → "Re-run all jobs").
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR when a new commit arrives.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast gate — always runs ─────────────────────────────────────────────────
  quick-checks:
    name: Typecheck + Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Pre-check: fail fast with a readable message if package.json and
      # package-lock.json are out of sync. Common cause on this repo: Lovable
      # updates package.json without regenerating the lockfile.
      - name: Verify package-lock.json matches package.json
        run: |
          if ! npm ci --dry-run > /dev/null 2>&1; then
            echo "::error::package-lock.json is out of sync with package.json."
            echo "::error::Fix locally: run 'npm install' then commit the updated package-lock.json."
            echo "::error::Do NOT merge until the lockfile is regenerated in this branch."
            exit 1
          fi
          echo "package-lock.json is in sync with package.json."

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ── Full Playwright suite — opt-in on PRs, always on main ──────────────────
  e2e:
    name: Playwright E2E Suite
    needs: quick-checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e'))

    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      PLAYWRIGHT_BASE_URL:  http://localhost:8080
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Start Vite preview server
        run: |
          npm run preview -- --port 8080 --host &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 > /dev/null && echo "Server ready" && break
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Vercel deploy — only on push to main, only if both gates pass ──────────
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: [quick-checks, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
