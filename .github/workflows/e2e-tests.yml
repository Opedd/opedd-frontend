name: Quick Checks + Deploy

# Triggers: every push to main and every PR targeting main.
# Vercel git integration is DISABLED — this workflow is the sole deployment path.
#
# The full Playwright E2E suite was scrapped on 2026-04-22 after a passing
# suite let 7 first-signup bugs slip to prod. Tests will be rebuilt later,
# after manual QA validates each flow (see memory:
# project_e2e_tests_scrapped.md for the philosophy + restoration guide).
#
# Current gate: typecheck + lint + unit tests. Fast (~2-3 min). Deploy to
# Vercel runs automatically on push to main if the gate passes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    name: Typecheck + Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Pre-check: fail fast with a readable message if package.json and
      # package-lock.json are out of sync. Common cause on this repo: Lovable
      # updates package.json without regenerating the lockfile.
      - name: Verify package-lock.json matches package.json
        run: |
          if ! npm ci --dry-run > /dev/null 2>&1; then
            echo "::error::package-lock.json is out of sync with package.json."
            echo "::error::Fix locally: run 'npm install' then commit the updated package-lock.json."
            exit 1
          fi
          echo "package-lock.json is in sync with package.json."

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: quick-checks
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
