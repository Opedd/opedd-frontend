    <!--
      Anti-FOUC: apply saved theme before React hydrates.
      darkMode: ["class"] in tailwind.config.ts — this script sets the .dark class
      synchronously so the first paint matches the user's preference.
      When dark mode UI is built, read from localStorage("opedd-theme") here.
    -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('opedd-theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
